{
    custom_vars = ["backup_info:nothing"]
	publish_custom_vars = "true"
    instances_key = "-d"
    map_key = "-m"
    command = "/opt/backup/main.py backup -f {{.data_folder}} {{.dbs}}"
    restore_command = "/opt/backup/main.py restore -f {{.data_folder}} {{.dbs}} {{.dbmap}} {{.restore_roles}}"
    list_instances_in_vault_command = "/opt/backup/main.py list-dbs -f {{.data_folder}}"
    tls_enabled: ${?INTERNAL_TLS_ENABLED}
    certs_path: ${?INTERNAL_TLS_PATH}
}