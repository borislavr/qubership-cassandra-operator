name: Remove Artifacts for deleted branch
on: delete

env:
  TAG_NAME: ${{ github.event.ref_name }}

jobs:
  delete:
    if: github.event.ref_type == 'branch'
    permissions:
      packages: write
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        component:
          - name: qubership-cassandra-operator
            context: ""
          - name: qubership-cassandra-operator-transfer
            context: ""
          - name: cassandra-docker-backup-daemon
            context: ""
          - name: cassandra-docker-dbaas-adapter
            context: ""
          - name: cassandra-docker-tests
            context: ""
          - name: cassandra-supplementary
            context: ""
          - name: cassandra-supplementary-transfer
            context: ""
          - name: docker-cassandra_4.1
            context: ""
          - name: docker-cassandra_5.0
            context: ""
          - name: cassandra-docker-transfer_4.1
            context: ""
          - name: cassandra-docker-transfer_5.0
            context: ""
          - name: cassandra-docker-reaper
            context: ""
    steps:
      - name: Prepare Tag
        run: echo "TAG_NAME=$(echo ${TAG_NAME} | sed 's@refs/heads/@@;s@/@_@g')" >> $GITHUB_ENV
      - name: Login to Docker Hub
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${GITHUB_ACTOR}
          password: ${{secrets.GITHUB_TOKEN}}
      - name: Get package IDs for delete
        id: get-ids-for-delete
        uses: Netcracker/get-package-ids@84bc8eb8bed50218be76e671b3a24c35a1300979
        with:
          component-name: ${{ matrix.component.name }}
          component-tag: ${{ env.TAG_NAME }}
          access-token: ${{secrets.GITHUB_TOKEN}}
      - uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ matrix.component.name }}
          package-type: 'container'
          package-version-ids: ${{ steps.get-ids-for-delete.outputs.ids-for-delete }}
        if: ${{ steps.get-ids-for-delete.outputs.ids-for-delete != '' }}
